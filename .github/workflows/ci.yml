name: CI/CD Pipeline

on:
  push:
    branches: ['main', 'beta', 'alpha']
  pull_request:
    branches: ['main']

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run type-check

      - name: Run linting
        run: npm run lint

      - name: Run format check
        run: npm run check

      - name: Run unit tests
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

      - name: Build package
        run: npm run build

      - name: Test example app
        run: |
          cd example
          npm install
          npm run build

  compatibility:
    name: Browser Compatibility
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Test ESM import
        run: node -e "import('./dist/index.es.js').then(m => console.log('ESM import successful'))"

      - name: Test CommonJS require
        run: node -e "const pkg = require('./dist/index.cjs.js'); console.log('CJS require successful')"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, compatibility]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/alpha'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || '' }}
        run: npx semantic-release

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Run dependency check
        run: npx depcheck

  performance:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Check bundle size
        run: |
          echo "Bundle sizes:"
          ls -lh dist/
          echo "ES bundle size: $(wc -c < dist/index.es.js) bytes"
          echo "UMD bundle size: $(wc -c < dist/index.umd.js) bytes"
          echo "CJS bundle size: $(wc -c < dist/index.cjs.js) bytes"
          echo "CSS size: $(wc -c < dist/index.css) bytes"

      - name: Analyze bundle
        run: npx vite-bundle-analyzer dist/index.es.js --mode=json > bundle-analysis.json || true
